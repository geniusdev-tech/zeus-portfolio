services:
  - type: web
    name: zeus-backend
    runtime: go
    buildCommand: go build -ldflags="-s -w" -o zeus-backend ./cmd/server/main.go
    startCommand: ./zeus-backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: QELOX_DOWNLOAD_URL
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
